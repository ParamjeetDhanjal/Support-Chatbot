<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-box {
      width: 100%;
      max-width: 420px;
      height: 620px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #075e54;
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      flex-shrink: 0;
    }
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #25d366;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-info h2 { font-size: 15px; font-weight: 600; }
    .header-info p  { font-size: 12px; color: #a8d5a2; margin-top: 1px; }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #25d366; margin-left: auto;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #ece5dd;
    }

    .bubble {
      max-width: 82%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13.5px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .bubble.bot {
      background: #fff;
      align-self: flex-start;
      border-top-left-radius: 2px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .bubble.user {
      background: #dcf8c6;
      align-self: flex-end;
      border-top-right-radius: 2px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .bubble .time {
      font-size: 10px;
      color: #999;
      margin-top: 3px;
      text-align: right;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }
    .opt-btn {
      background: #fff;
      border: 1.5px solid #25d366;
      color: #075e54;
      padding: 8px 13px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background .15s, color .15s;
    }
    .opt-btn:hover { background: #25d366; color: #fff; }
    .opt-btn:disabled { opacity: .45; cursor: default; }

    .typing-wrap { display: flex; align-items: flex-end; gap: 4px; }
    .typing-bubble {
      background: #fff;
      border-radius: 10px;
      border-top-left-radius: 2px;
      padding: 10px 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    .input-bar {
      background: #f0f2f5;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    #txt {
      flex: 1;
      border: none;
      background: #fff;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #075e54;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }
    #send-btn:disabled { opacity: .4; cursor: default; }

    .callback-form {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .callback-form p { font-size: 13px; font-weight: 600; color: #333; }
    .callback-form input {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .callback-form input:focus { border-color: #25d366; }
    .callback-form button {
      background: #075e54;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      cursor: pointer;
    }

    .agent-card {
      background: #fff;
      border-radius: 10px;
      padding: 13px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .agent-card .icon { font-size: 28px; margin-bottom: 6px; }
    .agent-card p { font-size: 13px; color: #333; line-height: 1.5; }
    .agent-card a {
      display: inline-block;
      margin-top: 8px;
      background: #25d366;
      color: #fff;
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="chat-box">

  <div class="header">
    <div class="avatar">🛍️</div>
    <div class="header-info">
      <h2>Support chatbot</h2>
      <p>Typically replies instantly</p>
    </div>
    <div class="online-dot"></div>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="input-bar" id="input-bar" style="display:none">
    <input id="txt" type="text" placeholder="Type your question…" autocomplete="off"/>
    <button id="send-btn" onclick="sendFreeText()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div style="text-align:center; margin-top:10px; align-items: center;" class="refresh-button">
    <button onclick="location.reload()" style="background-color: #075e54; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer;">
      Refresh
    </button>
</div>
</div>
<script>
let phase          = "menu";    
let currentTopic   = null;
let freeTextTries  = 0;
const MAX_TRIES    = 2;

const msgs = document.getElementById("msgs");

function now() {
  return new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function scrollBottom() {
  msgs.scrollTop = msgs.scrollHeight;
}

function addBubble(html, role="bot") {
  const d = document.createElement("div");
  d.className = "bubble " + role;
  d.innerHTML = html + `<div class="time">${now()}</div>`;
  msgs.appendChild(d);
  scrollBottom();
  return d;
}

function addUserBubble(text) {
  addBubble(`<span>${esc(text)}</span>`, "user");
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "typing-wrap"; d.id = "typing";
  d.innerHTML = `<div class="typing-bubble"><div class="dots">
    <span></span><span></span><span></span></div></div>`;
  msgs.appendChild(d); scrollBottom();
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

function disableAllButtons() {
  document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

async function api(path, opts={}) {
  const r = await fetch(path, opts);
  return r.json();
}

async function startMenu() {
  phase = "menu";
  addBubble(" Hi! I'm your support assistant.<br>What can I help you with today?");

  showTyping();
  const data = await api("/topics");
  removeTyping();

  const d = document.createElement("div");
  d.className = "bubble bot";
  let html = `<span>Please choose a topic:</span><div class="options">`;
  data.topics.forEach(t => {
    html += `<button class="opt-btn" onclick="pickTopic('${esc(t)}')">${esc(t)}</button>`;
  });
  html += `</div><div class="time">${now()}</div>`;
  d.innerHTML = html;
  msgs.appendChild(d);
  scrollBottom();
}

async function pickTopic(topic) {
  disableAllButtons();
  addUserBubble(topic);
  currentTopic = topic;
  phase = "sub";

  showTyping();
  const data = await api(`/questions/${encodeURIComponent(topic)}`);
  removeTyping();

  const d = document.createElement("div");
  d.className = "bubble bot";
  let html = `<span>Select your question:</span><div class="options">`;
  data.questions.forEach(q => {
    html += `<button class="opt-btn" onclick="pickQuestion('${esc(q)}')">${esc(q)}</button>`;
  });
  html += `<button class="opt-btn" onclick="goFreeText('${esc(topic)}')">🔍 My question isn't listed</button>`;
  html += `</div><div class="time">${now()}</div>`;
  d.innerHTML = html;
  msgs.appendChild(d);
  scrollBottom();
}

async function pickQuestion(question) {
  disableAllButtons();
  addUserBubble(question);
  phase = "answer";

  showTyping();
  const data = await api(`/answer?question=${encodeURIComponent(question)}`);
  await sleep(600);
  removeTyping();

  if (data.found) {
    addBubble(`<span>${esc(data.answer)}</span>`);
    await sleep(400);
    askDidItHelp();
  } else {
    addBubble("Hmm, I couldn't find an answer. Let me help you another way.");
    await sleep(400);
    goFreeText(currentTopic);
  }
}

function askDidItHelp() {
  const d = document.createElement("div");
  d.className = "bubble bot";
  d.innerHTML = `
    <span>Did this answer your question?</span>
    <div class="options">
      <button class="opt-btn" onclick="handleYes()">✅ Yes, thanks!</button>
      <button class="opt-btn" onclick="handleNo()">❌ No, I need more help</button>
    </div>
    <div class="time">${now()}</div>`;
  msgs.appendChild(d);
  scrollBottom();
}

function handleYes() {
  disableAllButtons();
  addUserBubble("Yes, thanks!");
  phase = "done";
  addBubble("🎉 Glad I could help! Have a great day.<br>Feel free to come back anytime.");
}

function handleNo() {
  disableAllButtons();
  addUserBubble("No, I need more help");
  goFreeText(currentTopic);
}

async function goFreeText(topic) {
  phase = "freetext";
  freeTextTries = 0;
  document.getElementById("input-bar").style.display = "flex";
  await sleep(300);
  addBubble(`No problem! Please type your question about <b>${esc(topic)}</b> below and I'll do my best to help.`);
  document.getElementById("txt").focus();
}

async function sendFreeText() {
  const input = document.getElementById("txt");
  const btn   = document.getElementById("send-btn");
  const msg   = input.value.trim();
  if (!msg) return;

  disableAllButtons();
  addUserBubble(msg);
  input.value = "";
  btn.disabled = true;
  showTyping();

  try {
    const data = await api("/ask", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: msg})
    });
    removeTyping();
    addBubble(`<span>${esc(data.reply)}</span>`);

    freeTextTries++;
    await sleep(500);

    if (freeTextTries >= MAX_TRIES) {
      document.getElementById("input-bar").style.display = "none";
      await sleep(300);
      addBubble("I've done my best but it looks like you may need direct help from our team.");
      await sleep(400);
      showCallbackPrompt();
    } else {
      askStillHelped();
    }
  } catch {
    removeTyping();
    addBubble("Sorry, something went wrong. Please try again.");
  }

  btn.disabled = false;
}

function askStillHelped() {
  const d = document.createElement("div");
  d.className = "bubble bot";
  d.innerHTML = `
    <span>Did that answer your question?</span>
    <div class="options">
      <button class="opt-btn" onclick="handleYes()">✅ Yes, sorted!</button>
      <button class="opt-btn" onclick="keepTyping()">❌ Still need help</button>
      <button class="opt-btn" onclick="showCallbackPromptFromBtn()">📞 Talk to an agent</button>
    </div>
    <div class="time">${now()}</div>`;
  msgs.appendChild(d);
  scrollBottom();
}

function keepTyping() {
  disableAllButtons();
  addUserBubble("Still need help");
  addBubble("Okay, please describe your issue in more detail and I'll try again.");
  document.getElementById("txt").focus();
}

function showCallbackPromptFromBtn() {
  disableAllButtons();
  addUserBubble("Talk to an agent");
  document.getElementById("input-bar").style.display = "none";
  showCallbackPrompt();
}

function showCallbackPrompt() {
  phase = "callback";
  const d = document.createElement("div");
  d.className = "bubble bot";
  d.style.padding = "0";
  d.style.background = "transparent";
  d.style.boxShadow = "none";
  d.innerHTML = `
    <div class="callback-form">
      <p>📞 Request a Callback</p>
      <input id="cb-name"  type="text"  placeholder="Your name"         autocomplete="off"/>
      <input id="cb-phone" type="tel"   placeholder="Your phone number" autocomplete="off"/>
      <input id="cb-issue" type="text"  placeholder="Briefly describe your issue" autocomplete="off"/>
      <button onclick="submitCallback()">Request Callback</button>
    </div>
    <div class="time">${now()}</div>`;
  msgs.appendChild(d);
  scrollBottom();
}

async function submitCallback() {
  const name  = document.getElementById("cb-name").value.trim();
  const phone = document.getElementById("cb-phone").value.trim();
  const issue = document.getElementById("cb-issue").value.trim();

  if (!name || !phone || !issue) {
    alert("Please fill in all fields.");
    return;
  }

  disableAllButtons();
  document.querySelectorAll(".callback-form button").forEach(b => b.disabled = true);
  document.querySelectorAll(".callback-form input").forEach(i => i.disabled = true);

  showTyping();

  try {
    const data = await api("/callback", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({name, phone, issue})
    });
    removeTyping();

    const d = document.createElement("div");
    d.className = "bubble bot";
    d.style.padding = "0";
    d.style.background = "transparent";
    d.style.boxShadow = "none";
    d.innerHTML = `
      <div class="agent-card">
        <div class="icon">✅</div>
        <p><b>Callback request received!</b><br><br>
        Hi <b>${esc(name)}</b>, our support agent will call you at <b>${esc(phone)}</b> shortly.<br><br>
        Our team is available <b>Mon–Sat, 9 AM – 6 PM IST</b>.</p>
        <a href="tel:${esc(data.agent_phone)}">📞 Call us now</a>
      </div>
      <div class="time">${now()}</div>`;
    msgs.appendChild(d);
    scrollBottom();

    phase = "done";
  } catch {
    removeTyping();
    addBubble("Something went wrong. Please try again.");
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

document.getElementById("txt").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); sendFreeText(); }
});

startMenu();
</script>
</body>
</html>
